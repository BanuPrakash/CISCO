spring.application.name=orderapp
#server.port=9999
# provide database configuration using which Spring Data JPA creates DataSource: pool of DB connection
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/CISCO_JAVA
spring.datasource.username=root
spring.datasource.password=Welcome123

# details for EntityManagerFactory
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

management.endpoint.health.show-details=always
management.endpoints.web.exposure.exclude=
#management.endpoints.web.exposure.include=health, info
management.endpoints.web.exposure.include=*
management.metrics.distribution.percentiles-histogram.http.server.requests=true